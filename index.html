<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Wishes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Inclusive Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inclusive Sans', sans-serif;
      background:#264FAB;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:20px;
      padding:40px 34px;
    }

    .top{
      margin-bottom:28px;
    }

    .tag{
      display:inline-block;
      background:#264FAB;
      color:#fff;
      padding:7px 14px;
      border-radius:999px;
      font-size:13px;
      margin-bottom:18px;
    }

    h1{
      color:#000;
      font-size:36px;
      line-height:1.1;
      margin-bottom:12px;
      font-weight:700;
      word-break:break-word;
    }

    .sub{
      color:#444;
      font-size:15px;
      line-height:1.6;
    }

    form{
      margin-top:12px;
    }

    .group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#111;
      font-size:15px;
    }

    input,
    textarea{
      width:100%;
      border:1.5px solid #d8d8d8;
      border-radius:14px;
      padding:14px 15px;
      font-family:'Inclusive Sans', sans-serif;
      font-size:15px;
      outline:none;
      transition:0.2s ease;
      background:#fff;
    }

    input:focus,
    textarea:focus{
      border-color:#264FAB;
    }

    textarea{
      resize:none;
      min-height:120px;
      line-height:1.5;
    }

    .bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      margin-top:8px;
    }

    .count{
      font-size:13px;
      color:#666;
    }

    button{
      background:#264FAB;
      color:#fff;
      border:none;
      border-radius:14px;
      padding:13px 22px;
      font-size:15px;
      font-family:'Inclusive Sans', sans-serif;
      cursor:pointer;
      transition:0.2s ease;
      width:auto;
    }

    button:hover{
      transform:translateY(-1px);
    }

    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .message{
      margin-top:20px;
      font-size:14px;
      display:none;
      line-height:1.5;
    }

    .success{
      color:#264FAB;
    }

    .error{
      color:#d93025;
    }

    /* ---------------- MOBILE ---------------- */

    @media (max-width: 768px){

      body{
        padding:16px;
        align-items:flex-start;
      }

      .card{
        padding:28px 22px;
        border-radius:18px;
      }

      h1{
        font-size:30px;
      }

      .sub{
        font-size:14px;
      }

      input,
      textarea{
        font-size:16px;
      }

    }

    @media (max-width: 480px){

      body{
        padding:12px;
      }

      .card{
        padding:24px 18px;
        border-radius:16px;
      }

      .tag{
        font-size:12px;
        padding:6px 12px;
      }

      h1{
        font-size:26px;
        line-height:1.15;
      }

      .sub{
        font-size:14px;
      }

      label{
        font-size:14px;
      }

      input,
      textarea{
        padding:13px;
        border-radius:12px;
      }

      .bottom{
        flex-direction:column;
        align-items:stretch;
      }

      .count{
        text-align:left;
      }

      button{
        width:100%;
      }

    }

  </style>
</head>
<body>

  <div class="card">

    <div class="top">

      <div class="tag">Birthday Note</div>

      <h1>Say something about him!</h1>

      <div class="sub">
        Keep it short, genuine and memorable.
      </div>

    </div>

    <form id="wishForm">

      <div class="group">
        <label>Name</label>

        <input 
          type="text" 
          id="name" 
          placeholder="Your name"
          required
        >
      </div>

      <div class="group">
        <label>Content</label>

        <textarea 
          id="content"
          maxlength="120"
          placeholder="Write a short message..."
          required
        ></textarea>
      </div>

      <div class="bottom">

        <div class="count">
          <span id="count">0</span>/120
        </div>

        <button type="submit" id="submitBtn">
          Submit
        </button>

      </div>

      <div class="message success" id="successMsg">
        Thanks! Your message has been added.
      </div>

      <div class="message error" id="errorMsg">
        Couldn't submit right now. Try again.
      </div>

    </form>

  </div>

  <script>

    const form = document.getElementById('wishForm');
    const content = document.getElementById('content');
    const count = document.getElementById('count');

    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    const submitBtn = document.getElementById('submitBtn');

    content.addEventListener('input', () => {
      count.textContent = content.value.length;
    });

    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const name = document.getElementById('name').value.trim();
      const message = content.value.trim();

      try {

        const response = await fetch('https://sheetdb.io/api/v1/x94nbwu6w9yx7', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            data: [
              {
                Name: name,
                Content: message
              }
            ]
          })
        });

        if(response.ok){

          form.reset();
          count.textContent = '0';

          successMsg.style.display = 'block';

        }else{

          errorMsg.style.display = 'block';

        }

      } catch (err){

        errorMsg.style.display = 'block';

      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit';

    });

  </script>

</body>
</html>
